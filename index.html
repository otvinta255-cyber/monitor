<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>Монитор</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
/* 1. Увеличиваем высоту карточки для ПК */
:root {
    --bg-main: #050505;
    --bg-card: #111;
    --card-height-pc: 170px; /* Увеличили для 2 этажей */
    --card-height-mob: 245px; 
}

html {
    -webkit-text-size-adjust: 80%;
    text-size-adjust: 80%;
}

body { 
    background: var(--bg-main); color: #fff; font-family: 'Courier New', monospace; 
    padding: 15px; margin: 0; display: flex; flex-direction: column; 
    min-height: 100vh; box-sizing: border-box; overflow-x: hidden;
}

/* --- АДАПТИВНАЯ ШАПКА --- */
.header { 
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px;
    background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(5px);
    padding: 15px 20px; border-radius: 12px; border: 1px solid #222; 
    margin-bottom: 20px; flex-shrink: 0;
}
.header-info { display: flex; flex-direction: column; }
.timer-title { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;}
#session-status { color: #aaa; margin-top: 5px; font-size: 12px; }
.header-center { text-align: center; }
#main-timer { font-size: 48px; font-weight: bold; color: #00ffcc; font-family: monospace; line-height: 1; text-shadow: 0 0 15px rgba(0,255,204,0.3);}
.header-controls { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }

.header-btn {
    background: #222; color: #fff; border: 1px solid #444; padding: 8px 14px; 
    border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; white-space: nowrap;
}
.header-btn:hover { background: #333; border-color: #666; }
.header-btn.sound-off { background: #ffaa00; color: #000; border: none; }

/*//ВЕРТИКАЛЬНАЯ АДАПТАЦИЯ (Телефоны)
//Работает ТОЛЬКО когда телефон держим вертикально */
@media (max-width: 900px) and (orientation: portrait) {
    .header { display: flex; flex-direction: column; text-align: center; padding: 15px; gap: 10px; }
    .header-info { align-items: center; }
    .header-controls { justify-content: center; width: 100%; }
    #main-timer { font-size: 42px; margin: 0; }
}

/* --- АЛЬБОМНАЯ АДАПТАЦИЯ (Горизонтальное положение) 
       Срабатывает, когда экран перевернут горизонтально и не слишком высокий */
@media (max-height: 600px) and (orientation: landscape) {
    body { padding: 10px; } /* Чуть меньше отступов по бокам для экономии места */
    
    .header { 
        display: flex; flex-wrap: wrap; 
        padding: 6px 15px; gap: 5px 15px; 
        margin-bottom: 10px; border-radius: 8px;
    }
    
    /* 1. Текст в одну тонкую строку наверху */
    .header-info { 
        width: 100%; flex-direction: row; justify-content: center; align-items: baseline; gap: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px;
    }
    .timer-title { font-size: 11px; margin: 0; }
    #session-status { margin-top: 0; font-size: 11px; }
    
    /* 2. Таймер слева (в одну линию с кнопками) */
    .header-center { flex: 0 1 auto; text-align: left; }
    #main-timer { font-size: 28px; margin: 0; } /* Уменьшенный таймер */
    
    /* 3. Кнопки справа */
    .header-controls { flex: 1 1 auto; justify-content: flex-end; gap: 8px; }
    .header-btn { padding: 6px 10px; font-size: 11px; }
    
    /* Делаем саму карту чуть компактнее, чтобы больше места осталось пилотам */
    #specTrackMap { max-height: 55vh; }
}

/* --- КОНТЕНТ И КАРТА --- */
/* 2. Расширяем центральный контейнер (чтобы не был зажат в 1200px) */
.content-area { 
    display: flex; flex-direction: column; gap: 20px; flex-grow: 1; 
    width: 96%; max-width: 1700px; /* Было 1200px */
    margin: 0 auto; 
}

.map-container { 
    width: 100%; display: none; justify-content: center; align-items: center;
    border-radius: 12px; border: 1px solid #222; background: #0a0a0a; padding: 0; box-sizing: border-box;
    height: 35vh; min-height: 120px; position: relative; overflow: hidden;
    container-type: size; flex-shrink: 0;
}
#specTrackMap { 
    position: relative; width: 100%; max-height: 100%; 
    aspect-ratio: var(--ar, 1.7778); max-width: calc(100cqh * var(--ar, 1.7778)); 
    margin: 0 auto; 
}
#specTrackMapBg { 
    position: absolute; inset: 0; background-size: 100% 100%; 
    background-position: center; background-repeat: no-repeat; z-index: 1; pointer-events: none;
}

.map-zoom-controls {
    position: absolute; right: 10px; bottom: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 20;
}
.map-zoom-btn {
    background: rgba(10, 10, 10, 0.7); color: #00f2ff; border: 1px solid #00f2ff; border-radius: 6px;
    width: 40px; height: 40px; font-size: 28px; line-height: 1; display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; transition: 0.2s; box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.map-zoom-btn:active { background: #00f2ff; color: #000; }

/* Стили для обновленной шапки */
.header-center { display: flex; flex-direction: column; align-items: center; }
.voice-toggles { display: flex; gap: 10px; font-size: 11px; color: #aaa; margin-top: 5px; font-weight: bold; flex-wrap: wrap; justify-content: center; }
.voice-toggles label { cursor: pointer; display: flex; align-items: center; gap: 3px; }

#specTrackMapBg { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; }
.gate-marker { position: absolute; width: 60px; transform: translate(-50%, -50%); text-align: center; z-index: 10;}
.gate-label { font-weight: bold; color: #fff; text-shadow: 1px 1px 3px #000; font-size: 11px; margin-top: 2px;}
.leds { display: flex; justify-content: center; gap: 2px; }
.led { width: 10px; height: 10px; border-radius: 50%; background: #333; transition: 0.3s; }

@keyframes pulseGate {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.5); filter: brightness(1.5); box-shadow: 0 0 15px currentColor; }
    100% { transform: scale(1); filter: brightness(1); }
}
.pulse-anim { animation: pulseGate 1s infinite; }

@keyframes pulseLive {
    0% { opacity: 1; }
    50% { opacity: 0.3; text-shadow: 0 0 8px #00ff00; }
    100% { opacity: 1; }
}
.live-speed-text { animation: pulseLive 1.5s infinite; color: #00ff00 !important; font-weight: bold; }
.limit-speed-text { color: #ff0055 !important; animation: none; text-shadow: 0 0 5px #ff0055; font-weight: bold; }

/* --- КАРТОЧКИ ПИЛОТОВ --- */
.pilots-container { width: 100%; position: relative; transition: height 0.3s; }

/* 4. Перенастраиваем сетку карточки (Два этажа для ПК) */
.pilot-card { 
    background: var(--bg-card); border: 1px solid #222; border-radius: 10px; 
    position: absolute; left: 0; right: 0; box-sizing: border-box;
    height: var(--card-height-pc); transition: top 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
    display: grid; 
    grid-template-columns: max-content 1fr max-content; 
    grid-template-rows: max-content 1fr; 
    gap: 8px 15px; align-items: center; padding: 12px 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}
.pilot-card.leader { border-color: #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }

/* Левый блок: Аватар + Имя (2 этаж слева) */
.card-left { grid-column: 1; grid-row: 2; display: flex; align-items: center; gap: 12px; overflow: hidden; }
/* 5. Значительно увеличиваем аватар и текст для ПК */
.pilot-avatar { 
    width: 80px; height: 80px; /* Было 50px */
    border-radius: 8px; border: 2px solid #444; flex-shrink: 0;
    background-size: cover; background-position: center; background-color: #222;
    display: flex; align-items: center; justify-content: center; 
    font-size: 32px; font-weight: bold; text-shadow: 1px 1px 2px #000;
}
.pilot-info { display: flex; flex-direction: column; overflow: hidden; }
.pilot-name { font-size: 16px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.pilot-reg { font-size: 13px; color: #666; text-transform: uppercase; margin-top: 2px; }
.fav-btn { cursor: pointer; opacity: 0.2; transition: 0.2s; font-size: 20px; filter: grayscale(100%); flex-shrink: 0;}
.fav-btn.active { opacity: 1; filter: grayscale(0%); text-shadow: 0 0 10px #00f2ff; transform: scale(1.1);}

/* Центр: Прогресс + Ворота (1 этаж, 100% ширины) */
.card-center { grid-column: 1 / 4; grid-row: 1; width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 2px; min-width: 0; }
.progress-bar { width: 100%; height: 8px; background: #000; border-radius: 4px; border: 1px solid #333; overflow: hidden;}
.progress-fill { height: 100%; width: 0%; transition: width 0.3s ease-out; }
/* Умная шкала с затуханием по краям */
.gate-sequence { 
    display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; 
    font-size: 13px; font-weight: bold; font-family: sans-serif; text-transform: uppercase; 
    padding: 0 40px; align-items: center;
   
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
}
.gate-sequence::-webkit-scrollbar { display: none; }
/* Дизайн ворот: просто текст, без плашек (как у судей) */
.seq-gate { 
    color: #555; transition: all 0.3s; white-space: nowrap; padding: 2px 2px;
    position: relative; display: inline-flex; flex-direction: column; justify-content: flex-end; align-items: center;
    height: 30px; min-width: 18px; overflow: hidden; vertical-align: bottom;
}
.seq-gate.active { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.9); }
.seq-gate-text { position: relative; z-index: 1; pointer-events: none; margin-bottom: 2px; }
.speed-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    opacity: 0.4; transition: height 0.3s;
    z-index: 0; border-radius: 2px;
}

.seq-gate.finish-gate {
    min-width: 45px !important; /* Фиксируем ширину именно для финиша */
    font-weight: 900 !important;
}

/* Правый блок: Статистика (2 этаж справа) */
.card-right { grid-column: 3; grid-row: 2; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; padding-right: 5px;}
.pilot-timer { font-family: monospace; font-size: 20px; font-weight: bold; color: #00ffcc; line-height: 1;}
.status-badge { font-size: 15px; font-weight: bold; color: #aaa; background: #222; padding: 2px 10px; border-radius: 4px; padding-right: 5px;}
.stats-mini { font-size: 12px; color: #888; display: flex; gap: 12px; }
.stats-val { color: #fff; font-weight: bold; margin-left: 4px; white-space: nowrap; }
.delta-better { color: #00ff00; } .delta-worse { color: #ff4444; }


/* --- КЛАССЫ ДЛЯ КРУПНОЙ СТАТИСТИКИ --- */
.stats-board { display: flex; justify-content: flex-end; width: 100%; font-size: 11px; color: #888; margin-top: 4px; gap: 15px; }
.stats-col-l { display: flex; flex-direction: column; gap: 4px; text-align: left; width: 100px; flex-shrink: 0; }
.stats-col-r { display: flex; flex-direction: column; gap: 4px; text-align: right; width: 180px; flex-shrink: 0; }
.stat-v { font-size: 13.5px; }
.live-label { font-size: 11px; }


/* --- УНИВЕРСАЛЬНАЯ КОМПАКТНАЯ КАРТОЧКА (Для любых телефонов, вертикально и горизонтально) --- */
@media (max-width: 900px), (max-height: 600px) and (orientation: landscape) {
    body { padding: 4px; }
    .content-area { width: 100%; gap: 10px; }
    
    .gate-sequence { 
        padding: 0 10px; 
        -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
        mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
    }
    
    /* Меняем сетку на 2 колонки: Аватар слева, остальное — резиновая зона справа */
    .pilot-card {
        height: 170px !important; 
        grid-template-columns: 130px 1fr !important;
        grid-template-rows: max-content 1fr !important; 
        gap: 8px 10px !important; padding: 10px 8px !important; align-items: center;
    }
    
    /* 1 этаж: Прогресс-бар и точки на всю ширину (от 1 до 3 линии сетки) */
    .card-center { grid-column: 1 / 3 !important; grid-row: 1 !important; width: 100% !important; margin-bottom: 10px;}
    
    /* 2 этаж слева: Фотка и Имя */
    .card-left { grid-column: 1 !important; grid-row: 2 !important; width: auto !important; justify-content: flex-start; }
    
    /* 2 этаж справа: Таймер и Статистика */
    .card-right { 
        grid-column: 2 !important; grid-row: 2 !important; width: 100% !important; 
        flex-direction: column !important; align-items: flex-end !important; justify-content: center !important; 
        border-top: none !important; padding-top: 0 !important;
        min-width: 0 !important; /* МАГИЯ: запрещает тексту выталкивать блок за пределы экрана */
    }
    .card-right > div:first-child { width: auto !important; }
    
    /* ЧИСТЫЕ РАЗМЕРЫ БЕЗ ДУБЛЕЙ */
    .pilot-avatar { width: 80px !important; height: 80px !important; font-size: 26px !important; }
    .pilot-name { font-size: 16px !important; }
    .pilot-timer { font-size: 20px !important; padding: 0 !important; } /* Убрали вредный padding */
    .status-badge { font-size: 15px !important; padding: 2px 10px !important; }
    
    .stats-col-r { gap: 2px !important; width: 155px !important; flex-shrink: 0 !important; }
    .stats-col-l { gap: 2px !important; width: 90px !important; flex-shrink: 0 !important; }
    .stats-col-r { gap: 2px !important;  }
    .stat-v { font-size: 13.5px !important;  }
    .live-label { font-size: 11px !important; }
}

/* --- ПЕРЕСТРОЙКА ШАПКИ ПРИ ПОВОРОТЕ (Ландшафт) --- */
@media (max-height: 600px) and (orientation: landscape) {
    .header { display: flex; flex-wrap: wrap; padding: 6px 15px; gap: 5px 15px; margin-bottom: 10px; border-radius: 8px;}
    .header-info { width: 100%; flex-direction: row; justify-content: center; align-items: baseline; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
    .timer-title { font-size: 11px; margin: 0; }
    #session-status { margin-top: 0; font-size: 11px; }
    
    /* Таймер и галочки выстраиваются в одну линию */
    .header-center { flex: 0 1 auto; flex-direction: row; gap: 15px; align-items: center; }
    #main-timer { font-size: 28px; margin: 0; } 
    
    /* Скрываем галочки в ландшафте, если мало места, или делаем их мельче */
    .header-center > div:last-child { margin-top: 0 !important; }
    
    .header-controls { flex: 1 1 auto; justify-content: flex-end; gap: 8px; }
    .header-btn { padding: 6px 10px; font-size: 11px; }
}

</style>
</head>
<body>

<div class="header">
    <div class="header-info">
        <div class="timer-title" id="spec-header-title">LIVE РЕЗУЛЬТАТЫ ГОНКИ</div>
        <div id="session-status">Ожидание загрузки...</div>
    </div>
   <div class="header-center">
        <div id="main-timer">00:00</div>
        <div class="voice-toggles">
            <label><input type="checkbox" id="voiceLapCb" style="accent-color:#00f2ff;">🗣 Время</label>
            <label><input type="checkbox" id="voiceSpeedCb" style="accent-color:#00f2ff;">🗣 Скорость</label>
            <label><input type="checkbox" id="voiceDeltaCb" style="accent-color:#00f2ff;">🗣 Дельта</label>
        </div>
    </div>
    <div class="header-controls">
        <button id="fullscreenBtn" class="header-btn" onclick="toggleFullScreen()">⛶ На весь экран</button>
        <button id="monitorVibroBtn" class="header-btn sound-off" onclick="toggleMonitorVibro()">📳 Вибро</button>
        <button id="monitorSoundBtn" class="header-btn sound-off" onclick="toggleMonitorSound()">🔇 Звук</button>
    </div>
</div>

<div class="content-area">
    <div class="map-container" id="map-box">
        <div id="specTrackMap"><div id="specTrackMapBg"></div></div>
        <div class="map-zoom-controls">
            <div class="map-zoom-btn" onclick="changeMapHeight(30)">+</div>
            <div class="map-zoom-btn" onclick="changeMapHeight(-30)">−</div>
        </div>
    </div>
    <div class="pilots-container" id="board"></div>
</div>

<script>
// ПОДСТАВЬ СВОЮ ССЫЛКУ ИЗ КОНСОЛИ FIREBASE!
const firebaseConfig = { databaseURL: "https://racecontrol-f7358-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const board = document.getElementById('board');
const mapBox = document.getElementById('map-box');
const trackMapBg = document.getElementById('specTrackMapBg');
const trackMap = document.getElementById('specTrackMap');

let mapGates = []; 
let currentRaceData = null;
let favoritePilots = new Set();
let lastPilotState = {};
let needsScroll = {};
let lastStartSequence = 0;
let lastIsRaceRunning = false;

// Динамический расчет высоты карточек
// Динамический расчет высоты карточек
// Динамический расчет высоты карточек
function getCardSpacing() {
    // Если ширина планшета/телефона ИЛИ телефон повернут горизонтально
    if (window.innerWidth <= 900 || (window.innerHeight <= 600 && window.innerWidth > window.innerHeight)) {
        return 180; // Высота карточки (160px) + отступ (10px)
    }
    return 180; // Стандартная высота для ПК
}

// Перерисовка при изменении размера окна (чтобы карточки не наезжали друг на друга)
window.addEventListener('resize', () => {
    if(currentRaceData) renderBoard();
});

db.ref('liveMapImage').on('value', (snap) => {
    const m = snap.val();
    if(m && m.image) {
        trackMapBg.style.backgroundImage = `url(${m.image})`;
        let img = new Image();
        img.onload = () => { trackMap.style.setProperty('--ar', img.naturalWidth / img.naturalHeight); };
        img.src = m.image;
    } else {
        trackMapBg.style.backgroundImage = 'none'; 
        trackMap.style.setProperty('--ar', 16/9);
    }
});

db.ref('liveMapOpacity').on('value', (snap) => {
    if(snap.val() !== null) trackMapBg.style.opacity = snap.val();
});

db.ref('liveMapConfig').on('value', (snap) => {
    const m = snap.val();
    if(m) {
        trackMap.querySelectorAll('.gate-marker').forEach(e => e.remove());
        mapGates = m.gates || [];
        mapGates.forEach(g => {
            trackMap.innerHTML += `
            <div class="gate-marker" style="left:${g.left}; top:${g.top};">
                <div class="leds" id="gate_leds_${g.mark}">
                    <div class="led" id="led_${g.mark}_0"></div>
                    <div class="led" id="led_${g.mark}_1"></div>
                    <div class="led" id="led_${g.mark}_2"></div>
                    <div class="led" id="led_${g.mark}_3"></div>
                </div>
                <div class="gate-label">${g.name}</div>
            </div>`;
        });
    }
});

const pilotAudioProfiles = [ { freq: 600, type: 'sine' }, { freq: 850, type: 'sine' }, { freq: 1100, type: 'triangle' }, { freq: 1400, type: 'triangle' }, { freq: 700, type: 'square' }, { freq: 1000, type: 'square' } ];

window.toggleFav = function(pid) {
    if (favoritePilots.has(pid)) favoritePilots.delete(pid);
    else favoritePilots.add(pid);
    renderBoard();
};

window.changeMapHeight = function(delta) {
    let mapBox = document.getElementById('map-box');
    let newHeight = Math.max(120, mapBox.offsetHeight + delta); // Не дает сжать меньше 120px
    mapBox.style.height = newHeight + 'px';
};

db.ref('liveRace').on('value', (snapshot) => {
    currentRaceData = snapshot.val();
    // === ВОЗВРАЩАЕМ ЗВУК СТАРТА ===
        if (currentRaceData) {
        
        // === ЗАПУСК ОТСЧЕТА У ЗРИТЕЛЕЙ ===
        if (currentRaceData.startSequence && currentRaceData.startSequence !== lastStartSequence) {
            lastStartSequence = currentRaceData.startSequence;
            playMonitorCountdown();
        }
        // =================================

        // === ЗВУК ОСТАНОВКИ ИЛИ ЗАВЕРШЕНИЯ ГОНКИ ===
        if (lastIsRaceRunning === true && currentRaceData.isRaceRunning === false) {
            let activeP = (currentRaceData.pilots || []).filter(p => p.active);
            let allCompleted = activeP.length > 0 && activeP.every(p => p.finished || p.dnf);
            
            if (allCompleted) {
                playAllFinishedSound(); // Мягкий звук
            } else {
                playStopSound(); // Грубый звук
            }
        }
        lastIsRaceRunning = currentRaceData.isRaceRunning === true;

        if (currentRaceData.pilots) {
            currentRaceData.pilots.forEach(p => {
                if (p.active) {
                    let prev = lastPilotState[p.id];
                    if (prev) {
                        // Точно определяем, круг это или обычная метка
                        let lapChanged = (p.lap > (prev.lap || 0)); 
                        let gateChanged = (p.gateIndex !== prev.gateIndex) && p.gateIndex > 0; 
                        let justFinished = p.finished && !prev.finished;
                        let justDnf = p.dnf && !prev.dnf;

                        if (justDnf) {
                            if (favoritePilots.size === 0 || favoritePilots.has(p.id)) playMarioDeathSound();
                        } 
                        else if (justFinished) {
                            needsScroll[p.id] = true; 
                            if (favoritePilots.size === 0 || favoritePilots.has(p.id)) {
                                playVictorySound();
                                speakPilotStats(p, true, true); // Добавлен вызов голоса для финиша
                            }
                        } 
                        // Новый круг!
                        else if (lapChanged) {
                            needsScroll[p.id] = true;
                            if (favoritePilots.size === 0 || favoritePilots.has(p.id)) {
                                playLapSound(p.index || 0); // Новый звонкий звук
                                speakPilotStats(p, true);   // Озвучиваем итоги круга
                            }
                        }
                        // Обычная метка сектора
                        else if (gateChanged) {
                            needsScroll[p.id] = true; 
                            if (favoritePilots.size === 0 || favoritePilots.has(p.id)) {
                                playPilotSound(p.index || 0); // Стандартный звук
                                speakPilotStats(p, false);    // Озвучиваем только скорость (если включена)
                            }
                        }
                    } else {
                        needsScroll[p.id] = true; 
                    }
                    
                    lastPilotState[p.id] = { gateIndex: p.gateIndex, lap: p.lap || 0, finished: p.finished, dnf: p.dnf };
                }
            });
        }
    }
    renderBoard();
});

function renderBoard() {
    const data = currentRaceData;
    if (!data) return;

    if (data.config) {
        document.getElementById('spec-header-title').innerText = data.config.header || "LIVE РЕЗУЛЬТАТЫ";
        
        // Галочка теперь прячет/показывает главный текстовый заголовок
        document.getElementById('spec-header-title').style.display = data.config.showSession ? 'block' : 'none';
        
        // А статус гонки (старт/финиш/круги) теперь отображается ВСЕГДА
        document.getElementById('session-status').style.display = 'block'; 
        
        board.style.display = data.config.showPilots ? 'block' : 'none';
        mapBox.style.display = data.config.showMap ? 'flex' : 'none';
    }

    if (!data.pilots) {
        document.getElementById('session-status').innerText = "Гонка еще не запущена судьей";
        board.innerHTML = '<div style="color:#444;text-align:center;margin-top:50px;">Нет данных для отображения</div>';
        return;
    }

    let displayMainTimer = data.mainTimer || "00:00.000";
    if (data.isRaceRunning) displayMainTimer = displayMainTimer.split('.')[0]; 
    document.getElementById('main-timer').innerText = displayMainTimer;
    document.getElementById('main-timer').style.color = data.isRaceRunning ? '#00ffcc' : '#ff0055';
    
    let statusMsg = data.isRaceRunning ? `идет заезд: ${data.targetLaps} кр.` : 'Заезд завершен';
    document.getElementById('session-status').innerText = statusMsg;

    if (data.config && !data.config.showPilots) return; 

    let activePilots = data.pilots.filter(p => p.active === true);
    if(activePilots.length === 0) {
        board.innerHTML = '<div style="color:#444;text-align:center;margin-top:50px;">Нет активных пилотов на трассе</div>';
        return;
    }

    let visiblePilots = activePilots;
    if (favoritePilots.size > 0) visiblePilots = activePilots.filter(p => favoritePilots.has(p.id));

    const spacing = getCardSpacing();
    board.style.height = (visiblePilots.length * spacing) + 'px';
    
    // === ОБНОВЛЕНИЕ КАРТЫ (ДИОДЫ) ===
    let ledStates = {};
    visiblePilots.forEach(p => {
        if (p.gates && mapGates.length > 0 && p.index !== undefined) {
            p.gates.forEach((g, gIdx) => {
                if (g.active) {
                    let markId = mapGates[gIdx]?.mark;
                    if (markId) {
                        let isCurrent = (!p.finished && gIdx === p.gateIndex);
                        ledStates[`led_${markId}_${p.index}`] = { color: p.color, pulse: isCurrent };
                    }
                }
            });
        }
    });

    trackMap.querySelectorAll('.led').forEach(led => {
        let state = ledStates[led.id];
        if (state) {
            led.style.background = state.color;
            led.style.boxShadow = `0 0 10px ${state.color}`;
            if (state.pulse) {
                if (!led.classList.contains('pulse-anim')) led.classList.add('pulse-anim');
            } else { led.classList.remove('pulse-anim'); }
        } else {
            led.style.background = '#333'; led.style.boxShadow = 'none'; led.classList.remove('pulse-anim');
        }
    });

    // 1. УМНАЯ ПРОВЕРКА: Нужна ли полная перерисовка каркаса?
    let needsFullRebuild = false;
    if (board.children.length !== visiblePilots.length) {
        needsFullRebuild = true;
    } else {
        visiblePilots.forEach(p => {
            let card = document.getElementById('card_' + p.id);
            if (!card) needsFullRebuild = true;
            else {
                let seq = card.querySelector('.gate-sequence');
                if (seq && p.gates && seq.children.length !== p.gates.length) needsFullRebuild = true;
            }
        });
    }

    // 2. СОЗДАНИЕ КАРКАСА (Выполняется ТОЛЬКО при загрузке или изменении числа пилотов/меток)
    if (needsFullRebuild) {
        let newBoardHtml = '';
        visiblePilots.forEach((p, index) => {
            const topPos = index * spacing; 
            let gatesHtml = '';
            if (p.gates) { 
                p.gates.forEach(g => { 
                    let finishClass = (g.name.toLowerCase() === "финиш") ? 'finish-gate' : '';
                    gatesHtml += `<span class="seq-gate ${finishClass}">
                                     <span class="speed-bar-container"></span>
                                     <span class="seq-gate-text">${g.name}</span>
                                  </span>`; 
                }); 
            }

            newBoardHtml += `
            <div class="pilot-card" id="card_${p.id}" style="top: ${topPos}px;">
                <div class="card-left">
                    <div class="pilot-avatar"></div>
                    <div class="pilot-info">
                        <div class="fav-btn" onclick="toggleFav('${p.id}')" style="font-size: 16px; margin-bottom: 2px; width: max-content;">👁️</div>
                        <div class="pilot-name"></div>
                        <div class="pilot-reg"></div>
                    </div>
                </div>
                <div class="card-center">
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                    <div class="gate-sequence">${gatesHtml}</div>
                </div>
                <div class="card-right" style="width:100%; align-items: flex-end;">
                    <div style="display:flex; align-items:center; justify-content:flex-end; gap:10px; width:100%;">
                        <div class="status-badge"></div>
                        <div class="pilot-timer"></div>
                    </div>
                    <div class="stats-board">
                         <div class="stats-col-l">
                             <div><span style="display:inline-block; width:25px;">Кр:</span><span class="stats-val last-lap-val stat-v"></span></div>
                             <div><span style="display:inline-block; width:25px;">Δ:</span><span class="stats-val delta-val stat-v"></span></div>
                         </div>
                         <div class="stats-col-r">
                             <div>Ср: <span class="stats-val avg-spd-val stat-v" style="color:#00f2ff;"></span></div>
                             <div>Макс: <span class="stats-val max-spd-val stat-v" style="color:#ffcc00;"></span></div>
                             <div style="white-space: nowrap;">LIVE (<span class="live-lbl-val live-label"></span>): <span class="stats-val live-spd-val stat-v"></span></div>
                         </div>
                    </div>
                </div>
            </div>`;
        });
        board.innerHTML = newBoardHtml;
    }

    // 3. ХИРУРГИЧЕСКОЕ ОБНОВЛЕНИЕ ДАННЫХ (Выполняется каждую секунду, не ломает скролл!)
    visiblePilots.forEach((p, index) => {
        const card = document.getElementById('card_' + p.id);
        if (!card) return;

        // Позиция, цвета и класс лидера
        card.style.top = (index * spacing) + 'px';
        card.style.borderLeftColor = p.color;
        if (index === 0 && p.lap > 0 && !p.dnf && data.config.autoSortEnabled) card.classList.add('leader');
        else card.classList.remove('leader');

        // Фото и Имя
        let avatar = card.querySelector('.pilot-avatar');
        if (p.photo) {
            avatar.style.backgroundImage = `url('${p.photo}')`;
            avatar.innerText = '';
        } else {
            avatar.style.backgroundImage = 'none';
            avatar.innerText = p.name.charAt(0);
        }
        avatar.style.borderColor = p.color;
        avatar.style.color = p.color;
        
        let nameEl = card.querySelector('.pilot-name');
        if(nameEl.innerText !== p.name) nameEl.innerText = p.name;
        nameEl.style.color = p.color;
        
        let regEl = card.querySelector('.pilot-reg');
        if(regEl.innerText !== p.regId) regEl.innerText = p.regId;
        
        let favBtn = card.querySelector('.fav-btn');
        if(favoritePilots.has(p.id)) favBtn.classList.add('active'); else favBtn.classList.remove('active');

        // Математика прогресса и времени
        let timerColor = "#00ffcc";
        let statusTxt = `Круг: ${p.lap} / ${data.targetLaps}`;
        let displayPTime = p.time;

        if (p.dnf) { timerColor = "#ff0055"; statusTxt = "СХОД"; } 
        else if (p.finished) { timerColor = "#ffcc00"; statusTxt = "ФИНИШ"; } 
        else if (data.isRaceRunning) { displayPTime = displayPTime.split('.')[0]; }

        let totalGatesInList = p.gates ? p.gates.length : 1; 
        let tLaps = data.targetLaps || 1;
        let lapForMath = p.lap > 0 ? p.lap - 1 : 0;
        let passedGates = p.gateIndex !== undefined ? Math.max(0, p.gateIndex + 1) : 0;
        
        // СТАЛО (Добавили условие && !p.dnf):
        let realProgress = (((lapForMath * totalGatesInList) + passedGates) / (tLaps * totalGatesInList)) * 100;

        // Заливаем до 100% ТОЛЬКО если это успешный финиш (без схода)
        if (p.finished && !p.dnf) realProgress = 100; 

        if (realProgress > 100) realProgress = 100;
        if (realProgress < 0) realProgress = 0;
        if (realProgress > 100) realProgress = 100;
        if (realProgress < 0) realProgress = 0;

        let rawDelta = p.deltaHtml || "--";
        let cleanDelta = "--";
        if (rawDelta !== "--" && rawDelta.includes("delta-worse")) {
            cleanDelta = `<span class="delta-worse">${rawDelta.replace(/(<([^>]+)>)/gi, "")}</span>`;
        } else if (rawDelta !== "--" && rawDelta.includes("delta-better")) {
            cleanDelta = `<span class="delta-better">${rawDelta.replace(/(<([^>]+)>)/gi, "")}</span>`;
        } else if (rawDelta !== "--") {
            cleanDelta = `<span style="color:#aaa;">${rawDelta.replace(/(<([^>]+)>)/gi, "")}</span>`;
        }

        // Вставка текста и стилей (без пересоздания HTML тегов)
        let badge = card.querySelector('.status-badge');
        if(badge.innerText !== statusTxt) badge.innerText = statusTxt;
        
        let timerEl = card.querySelector('.pilot-timer');
        if(timerEl.innerText !== displayPTime) timerEl.innerText = displayPTime;
        timerEl.style.color = timerColor;

        let prog = card.querySelector('.progress-fill');
        prog.style.width = realProgress + '%';
        prog.style.background = p.color;
        prog.style.boxShadow = `0 0 10px ${p.color}`;

        let ll = card.querySelector('.last-lap-val');
        let displayLapTime = "--";
        
        if (p.currentLapTime && p.currentLapTime !== "--") {
            displayLapTime = p.currentLapTime;
        } else {
            displayLapTime = p.lastLap || "--";
        }
        
        if(ll && ll.innerText !== displayLapTime) ll.innerText = displayLapTime;
        
        
        let deltaVal = card.querySelector('.delta-val');
        if(deltaVal && deltaVal.innerHTML !== cleanDelta) deltaVal.innerHTML = cleanDelta;

        // --- НОВЫЕ ДАННЫЕ СКОРОСТИ ---
        let avgVal = card.querySelector('.avg-spd-val');
        if(avgVal && avgVal.innerText !== (p.avgSpeed || "--")) avgVal.innerText = p.avgSpeed || "--";
        
        let maxVal = card.querySelector('.max-spd-val');
        if(maxVal && maxVal.innerText !== (p.maxSpeed || "--")) maxVal.innerText = p.maxSpeed || "--";

        let liveLbl = card.querySelector('.live-lbl-val');
        if(liveLbl && liveLbl.innerText !== (p.liveSector || "--")) liveLbl.innerText = p.liveSector || "--";

        let liveSpd = card.querySelector('.live-spd-val');
        if(liveSpd && liveSpd.innerText !== (p.liveSpeed || "--")) liveSpd.innerText = p.liveSpeed || "--";
        
        if(liveSpd && p.liveSpeedClass) {
            let pureClass = p.liveSpeedClass.replace('stat-value', '').trim();
            liveSpd.className = `stats-val stat-v live-spd-val ${pureClass}`;
        }

        // Включение/Отключение "загоревшихся" точек
        // Включение/Отключение "загоревшихся" точек и рендер графиков
        let gateSpans = card.querySelectorAll('.seq-gate');
        if (p.gates && gateSpans.length === p.gates.length) {
            p.gates.forEach((g, gIdx) => {
                if (g.active) gateSpans[gIdx].classList.add('active');
                else gateSpans[gIdx].classList.remove('active');
                
                let barContainer = gateSpans[gIdx].querySelector('.speed-bar-container');
                if (barContainer) {
                    if (data.config && data.config.showSpeedBars && g.barHtml) {
                        if (barContainer.innerHTML !== g.barHtml) barContainer.innerHTML = g.barHtml;
                    } else {
                        if (barContainer.innerHTML !== "") barContainer.innerHTML = "";
                    }
                }
            });
        }
    });

    // 4. ПЛАВНАЯ АВТОПРОКРУТКА (Срабатывает ТОЛЬКО при физическом взятии новой точки)
    document.querySelectorAll('.pilot-card').forEach(card => {
        let pid = card.id.replace('card_', '');
        if (needsScroll[pid]) {
            let seq = card.querySelector('.gate-sequence');
            if(seq) {
                const activeGates = seq.querySelectorAll('.seq-gate.active');
                if (activeGates.length > 0) {
                    activeGates[activeGates.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }
            needsScroll[pid] = false; 
        }
    });
}

// === АВТОНОМНЫЙ ЗВУКОВОЙ И ВИБРО МОДУЛЬ ===
const AudioCtxMonitor = window.AudioContext || window.webkitAudioContext;
let monAudioCtx; let monSoundEnabled = false; let monVibroEnabled = false;

function initMonAudio() { if (!monAudioCtx) monAudioCtx = new AudioCtxMonitor(); if (monAudioCtx.state === 'suspended') monAudioCtx.resume(); }

function playMonTone(freq, durMs, vol, type, delayMs = 0) {
    if (!monSoundEnabled || !monAudioCtx) return;
    const osc = monAudioCtx.createOscillator(); const gain = monAudioCtx.createGain();
    osc.type = type; osc.frequency.value = freq; osc.connect(gain); gain.connect(monAudioCtx.destination);
    const startTime = monAudioCtx.currentTime + (delayMs / 1000); const stopTime = startTime + (durMs / 1000);
    gain.gain.setValueAtTime(vol, startTime); gain.gain.exponentialRampToValueAtTime(0.001, stopTime);
    osc.start(startTime); osc.stop(stopTime);
}

// === НОВАЯ ФУНКЦИЯ: ПОЛНЫЙ ОТСЧЕТ ДЛЯ ЗРИТЕЛЕЙ ===
function playMonitorCountdown() {
    if (!monSoundEnabled || !monAudioCtx) return;
    
    // Прогреваем динамик телефона, чтобы не "проглотил" первый звук
    if (monAudioCtx.state === 'suspended') monAudioCtx.resume();
    const dummyOsc = monAudioCtx.createOscillator();
    const dummyGain = monAudioCtx.createGain();
    dummyGain.gain.value = 0.001;
    dummyOsc.connect(dummyGain);
    dummyGain.connect(monAudioCtx.destination);
    dummyOsc.start();
    dummyOsc.stop(monAudioCtx.currentTime + 0.05);

    // Точное расписание звуков: 3, 2, 1, СТАРТ!
    setTimeout(() => playMonTone(440, 300, 0.15, 'square'), 250);
    setTimeout(() => playMonTone(440, 300, 0.15, 'square'), 1250);
    setTimeout(() => playMonTone(440, 300, 0.15, 'square'), 2250);
    setTimeout(() => playMonTone(880, 1600, 0.15, 'square'), 3250);
}

// === НОВАЯ ОЗВУЧКА И ОТДЕЛЕННЫЙ ЗВУК КРУГА ===
function playLapSound(pilotIndex) {
    const baseFreq = 1200 + ((pilotIndex % 4) * 100);
    // Двойной, более высокий и звонкий сигнал для старта нового круга
    playMonTone(baseFreq, 100, 0.15, 'square', 0);
    playMonTone(baseFreq * 1.25, 150, 0.15, 'square', 120);
    triggerVibration(2, false);
}

function speakPilotStats(p, isLapEnd, isFinish = false) {
    if (!window.speechSynthesis) return;
    
    let voiceLap = document.getElementById('voiceLapCb')?.checked;
    let voiceSpeed = document.getElementById('voiceSpeedCb')?.checked;
    let voiceDelta = document.getElementById('voiceDeltaCb')?.checked;
    
    if (!voiceLap && !voiceSpeed && !voiceDelta) return;
    
    let textParts = [];
    
    // 1. Озвучка круга или ФИНИША
    if (isLapEnd) {
        // Если финиш, берем текущий круг, если просто переход - предыдущий
        let completedLap = isFinish ? p.lap : (p.lap > 0 ? p.lap - 1 : 0);
        
        if (completedLap > 0) {
            if (voiceLap && p.lastLap && p.lastLap !== "--") {
                let lapSec = parseFloat(p.lastLap);
                if (!isNaN(lapSec)) {
                    let sayLap = lapSec.toFixed(2);
                    if(sayLap.endsWith("0")) sayLap = sayLap.slice(0, -1);
                    sayLap = sayLap.replace(".", " и "); 
                    
                    if (isFinish) {
                        // Рассчитываем итоговое время гонки
                        let totalStr = "";
                        let parts = (p.time || "").split(':');
                        if (parts.length >= 2) {
                            let m = parseInt(parts[0]);
                            let s = parseInt(parts[1].split('.')[0]);
                            if (m > 0) totalStr += `${m} мин `;
                            totalStr += `${s} сек`;
                        }
                        textParts.push(`Финиш! Итог: ${totalStr}. Крайний круг: ${sayLap}`);
                    } else {
                        textParts.push(`Круг ${completedLap}. Время ${sayLap}`);
                    }
                }
            } else if (isFinish && voiceLap) {
                textParts.push(`Финиш!`);
            }
        }
    }
    
    // 2. Озвучка дельты (на любой метке и на финише)
    // 2. Озвучка дельты (на любой метке и на финише)
    if (voiceDelta && p.deltaHtml && p.deltaHtml !== "--") {
        let div = document.createElement('div');
        div.innerHTML = p.deltaHtml;
        let txt = div.textContent.replace(',', '.').trim();
        let val = parseFloat(txt);
        if (!isNaN(val)) {
            let roundedVal = Math.round(val);
            if (roundedVal === 0) {
                textParts.push(`Ноль`);
            } else {
                let sign = roundedVal > 0 ? "плюс" : "минус";
                textParts.push(`${sign} ${Math.abs(roundedVal)}`);
            }
        }
    }
    
    // 3. Озвучка скорости
    if (voiceSpeed && p.liveSpeed && p.liveSpeed !== "--") {
        if (p.liveSpeed === "LIMIT") {
            textParts.push(`Превышение лимита`);
        } else {
            let spd = parseFloat(p.liveSpeed);
            if (!isNaN(spd)) {
                textParts.push(`Скорость ${Math.round(spd)}`);
            }
        }
    }
    
    if (textParts.length > 0) {
        let msg = new SpeechSynthesisUtterance(textParts.join('. '));
        msg.lang = 'ru-RU';
        msg.rate = 1.3; 
        window.speechSynthesis.speak(msg);
    }
}

function playPilotSound(pilotIndex) {
    const beeps = (pilotIndex % 4) + 1; const beepDur = 40; const pauseDur = 60; const baseFreq = 880; 
    for (let i = 0; i < beeps; i++) playMonTone(baseFreq, beepDur, 0.1, 'square', i * (beepDur + pauseDur));
    // Больше здесь не нужен звук финиша, мы вынесли его отдельно!
    triggerVibration(beeps, false);
}

function playVictorySound() {
    if (monSoundEnabled) {
        setTimeout(() => playMonTone(523.25, 150, 0.4, 'triangle'), 0);
        setTimeout(() => playMonTone(659.25, 150, 0.4, 'triangle'), 150);
        setTimeout(() => playMonTone(783.99, 150, 0.4, 'triangle'), 300);
        setTimeout(() => playMonTone(1046.50, 800, 0.4, 'triangle'), 450); // Финальная нота долгая!
    }
    if (monVibroEnabled && navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 400]);
}

// Приятный аккорд, когда все пилоты завершили гонку
function playAllFinishedSound() {
    if (monSoundEnabled) {
        setTimeout(() => playMonTone(523.25, 200, 0.2, 'sine'), 0);
        setTimeout(() => playMonTone(659.25, 200, 0.2, 'sine'), 200);
        setTimeout(() => playMonTone(783.99, 400, 0.2, 'sine'), 400);
    }
    if (monVibroEnabled && navigator.vibrate) {
        navigator.vibrate([100, 50, 100, 50, 200]);
    }
}

// 8-битный звук схода с трассы (С БРЯКОМ!)
function playMarioDeathSound() {
    if (monSoundEnabled) {
        const type = 'square';
        const vol = 0.2;
        // Тот самый "Бряк" (быстрый диссонанс/трель из двух нот одновременно)
        setTimeout(() => playMonTone(493.88, 60, vol, type), 0);   // Си
        setTimeout(() => playMonTone(349.23, 60, vol, type), 0);   // Фа
        setTimeout(() => playMonTone(493.88, 60, vol, type), 60); 
        setTimeout(() => playMonTone(349.23, 60, vol, type), 60); 
        setTimeout(() => playMonTone(493.88, 80, vol, type), 120); 
        setTimeout(() => playMonTone(349.23, 80, vol, type), 120); 
    }
    if (monVibroEnabled && navigator.vibrate) navigator.vibrate([200, 100, 400]);
}

function triggerVibration(beeps, isFinish) {
    if (!monVibroEnabled || !navigator.vibrate) return;
    let pattern = [];
    for(let i = 0; i < beeps; i++) { pattern.push(40); pattern.push(60); }
    if (isFinish) { pattern.push(100); pattern.push(500); }
    navigator.vibrate(pattern);
}

function toggleMonitorSound() {
    const btn = document.getElementById('monitorSoundBtn');
    if (!monSoundEnabled) {
        initMonAudio(); monSoundEnabled = true;
        btn.style.background = '#00cc00'; btn.style.color = 'white'; btn.innerText = '🔊 Звук';
        playMonTone(1000, 100, 0.1, 'sine');
        requestWakeLock(); // Теперь Звук тоже запускает удержание экрана!
    } else { 
        monSoundEnabled = false; 
        btn.style.background = '#ffaa00'; btn.style.color = '#000'; btn.innerText = '🔇 Звук'; 
        requestWakeLock(); 
    }
}

// Грубый звук принудительной остановки таймера
function playStopSound() {
    if (monSoundEnabled) {
        // Два низких, "тревожных" сигнала (sawtooth - более резкий звук)
        setTimeout(() => playMonTone(250, 300, 0.2, 'sawtooth'), 0);
        setTimeout(() => playMonTone(200, 500, 0.2, 'sawtooth'), 350);
    }
    if (monVibroEnabled && navigator.vibrate) {
        navigator.vibrate([300, 100, 500]); // Длинная тяжелая вибрация
    }
}

function toggleMonitorVibro() {
    const btn = document.getElementById('monitorVibroBtn');
    if (!monVibroEnabled) {
        monVibroEnabled = true; btn.style.background = '#00cc00'; btn.style.color = 'white'; btn.innerText = '📳 Вибро';
        requestWakeLock(); 
        if (navigator.vibrate) navigator.vibrate(100);
    } else { 
        monVibroEnabled = false; 
        btn.style.background = '#ffaa00'; btn.style.color = '#000'; btn.innerText = '📳 Вибро'; 
        requestWakeLock(); 
    }
}

function toggleFullScreen() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        let docEl = document.documentElement;
        if (docEl.requestFullscreen) docEl.requestFullscreen(); else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

// === НАДЕЖНЫЙ WAKELOCK (Исправлено) ===
let wakeLock = null;

async function requestWakeLock() {
    if ('wakeLock' in navigator) {
        try {
            // Если экран уже удерживается, сначала сбросим старое удержание, чтобы не было конфликтов
            if (wakeLock !== null) {
                await wakeLock.release();
                wakeLock = null;
            }
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => { 
                wakeLock = null; // Правильно очищаем переменную
                console.log('Удержание экрана снято'); 
            });
            console.log('Экран защищен от засыпания');
        } catch (err) { 
            console.error(`Ошибка Wake Lock: ${err.message}`); 
        }
    }
}

// Если зритель свернул браузер (ответил в телеграме) и вернулся, 
// браузер автоматически снимает защиту. Эта логика восстановит ее,
// но ТОЛЬКО если человек до этого нажал Вибро или Звук.
document.addEventListener('visibilitychange', async () => { 
    if (document.visibilityState === 'visible' && (monSoundEnabled || monVibroEnabled)) {
        await requestWakeLock(); 
    } 
});
</script>
