<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>RaceControl - Монитор Зрителей</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root {
    --bg-main: #050505;
    --bg-card: #111;
    --card-height-pc: 85px;
    --card-height-mob: 160px; /* Увеличенная высота для мобильной стопки */
}

body { 
    background: var(--bg-main); color: #fff; font-family: 'Courier New', monospace; 
    padding: 15px; margin: 0; display: flex; flex-direction: column; 
    min-height: 100vh; box-sizing: border-box; overflow-x: hidden;
}

/* --- АДАПТИВНАЯ ШАПКА --- */
.header { 
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px;
    background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(5px);
    padding: 15px 20px; border-radius: 12px; border: 1px solid #222; 
    margin-bottom: 20px; flex-shrink: 0;
}
.header-info { display: flex; flex-direction: column; }
.timer-title { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;}
#session-status { color: #aaa; margin-top: 5px; font-size: 12px; }
.header-center { text-align: center; }
#main-timer { font-size: 48px; font-weight: bold; color: #00ffcc; font-family: monospace; line-height: 1; text-shadow: 0 0 15px rgba(0,255,204,0.3);}
.header-controls { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }

.header-btn {
    background: #222; color: #fff; border: 1px solid #444; padding: 8px 14px; 
    border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; white-space: nowrap;
}
.header-btn:hover { background: #333; border-color: #666; }
.header-btn.sound-off { background: #ffaa00; color: #000; border: none; }

@media (max-width: 900px) {
    .header { display: flex; flex-direction: column; text-align: center; padding: 15px; }
    .header-info { align-items: center; }
    .header-controls { justify-content: center; width: 100%; }
    #main-timer { font-size: 42px; margin: 5px 0; }
}

/* --- КОНТЕНТ И КАРТА --- */
.content-area { display: flex; flex-direction: column; gap: 20px; flex-grow: 1; width: 100%; max-width: 1200px; margin: 0 auto; }

.map-container { 
    width: 100%; display: none; justify-content: center; align-items: center;
    border-radius: 12px; border: 1px solid #222; background: #0a0a0a; padding: 10px; box-sizing: border-box;
}
#specTrackMap { 
    position: relative; width: 100%; max-height: 40vh; 
    max-width: calc(40vh * var(--ar, 1.7778)); aspect-ratio: var(--ar, 1.7778); margin: 0 auto; 
}
#specTrackMapBg { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; }
.gate-marker { position: absolute; width: 60px; transform: translate(-50%, -50%); text-align: center; z-index: 10;}
.gate-label { font-weight: bold; color: #fff; text-shadow: 1px 1px 3px #000; font-size: 11px; margin-top: 2px;}
.leds { display: flex; justify-content: center; gap: 2px; }
.led { width: 10px; height: 10px; border-radius: 50%; background: #333; transition: 0.3s; }

@keyframes pulseGate {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.5); filter: brightness(1.5); box-shadow: 0 0 15px currentColor; }
    100% { transform: scale(1); filter: brightness(1); }
}
.pulse-anim { animation: pulseGate 1s infinite; }

/* --- КАРТОЧКИ ПИЛОТОВ --- */
.pilots-container { width: 100%; position: relative; transition: height 0.3s; }

.pilot-card { 
    background: var(--bg-card); border: 1px solid #222; border-radius: 10px; 
    position: absolute; left: 0; right: 0; box-sizing: border-box;
    height: var(--card-height-pc); transition: top 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
    display: grid; grid-template-columns: 240px 1fr 200px; gap: 20px; align-items: center; padding: 0 15px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}
.pilot-card.leader { border-color: #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }

/* Левый блок: Аватар + Имя */
.card-left { display: flex; align-items: center; gap: 12px; overflow: hidden; }
.pilot-avatar { 
    width: 50px; height: 50px; border-radius: 8px; border: 2px solid #444; flex-shrink: 0;
    background-size: cover; background-position: center; background-color: #222;
    display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-shadow: 1px 1px 2px #000;
}
.pilot-info { display: flex; flex-direction: column; overflow: hidden; }
.pilot-name { font-size: 18px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.pilot-reg { font-size: 11px; color: #666; text-transform: uppercase; margin-top: 2px; }
.fav-btn { cursor: pointer; opacity: 0.2; transition: 0.2s; font-size: 20px; filter: grayscale(100%); flex-shrink: 0;}
.fav-btn.active { opacity: 1; filter: grayscale(0%); text-shadow: 0 0 10px #00f2ff; transform: scale(1.1);}

/* Центр: Прогресс + Ворота */
.card-center { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.progress-bar { width: 100%; height: 8px; background: #000; border-radius: 4px; border: 1px solid #333; overflow: hidden;}
.progress-fill { height: 100%; width: 0%; transition: width 0.3s ease-out; }
.gate-sequence { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.gate-sequence::-webkit-scrollbar { display: none; }
.seq-gate { background: #1a1a1a; color: #555; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; white-space: nowrap; border: 1px solid #222;}
.seq-gate.active { background: #222; color: #fff; border-color: #555; box-shadow: inset 0 0 5px rgba(255,255,255,0.1); }

/* Правый блок: Статистика */
.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.pilot-timer { font-family: monospace; font-size: 22px; font-weight: bold; color: #00ffcc; line-height: 1;}
.status-badge { font-size: 11px; font-weight: bold; color: #aaa; background: #222; padding: 2px 6px; border-radius: 4px;}
.stats-mini { font-size: 12px; color: #888; display: flex; gap: 12px; }
.stats-val { color: #fff; font-weight: bold; margin-left: 4px; }
.delta-better { color: #00ff00; } .delta-worse { color: #ff4444; }

/* --- МОБИЛЬНАЯ АДАПТАЦИЯ КАРТОЧКИ --- */
@media (max-width: 800px) {
    .pilot-card {
        height: var(--card-height-mob); grid-template-columns: 1fr; grid-template-rows: auto auto auto; 
        gap: 12px; padding: 12px 15px; align-items: start;
    }
    .card-left { width: 100%; justify-content: space-between; }
    .card-center { width: 100%; }
    .card-right { width: 100%; flex-direction: row; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 8px;}
    .pilot-avatar { width: 40px; height: 40px; font-size: 20px;}
    .pilot-name { font-size: 16px; }
    .pilot-timer { font-size: 18px; }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-info">
        <div class="timer-title" id="spec-header-title">LIVE РЕЗУЛЬТАТЫ ГОНКИ</div>
        <div id="session-status">Ожидание загрузки...</div>
    </div>
    <div class="header-center">
        <div id="main-timer">00:00</div>
    </div>
    <div class="header-controls">
        <button id="fullscreenBtn" class="header-btn" onclick="toggleFullScreen()">⛶ На весь экран</button>
        <button id="monitorVibroBtn" class="header-btn sound-off" onclick="toggleMonitorVibro()">📳 Вибро</button>
        <button id="monitorSoundBtn" class="header-btn sound-off" onclick="toggleMonitorSound()">🔇 Звук</button>
    </div>
</div>

<div class="content-area">
    <div class="map-container" id="map-box">
        <div id="specTrackMap"><div id="specTrackMapBg"></div></div>
    </div>
    <div class="pilots-container" id="board"></div>
</div>

<script>
// ПОДСТАВЬ СВОЮ ССЫЛКУ ИЗ КОНСОЛИ FIREBASE!
const firebaseConfig = { databaseURL: "https://racecontrol-f7358-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const board = document.getElementById('board');
const mapBox = document.getElementById('map-box');
const trackMapBg = document.getElementById('specTrackMapBg');
const trackMap = document.getElementById('specTrackMap');

let mapGates = []; 
let currentRaceData = null;
let favoritePilots = new Set();
let lastPilotState = {};

// Динамический расчет высоты карточек
function getCardSpacing() {
    return window.innerWidth <= 800 ? 175 : 100; // Высота карточки + отступ (margin/gap)
}

// Перерисовка при изменении размера окна (чтобы карточки не наезжали друг на друга)
window.addEventListener('resize', () => {
    if(currentRaceData) renderBoard();
});

db.ref('liveMapImage').on('value', (snap) => {
    const m = snap.val();
    if(m && m.image) {
        trackMapBg.style.backgroundImage = `url(${m.image})`;
        let img = new Image();
        img.onload = () => { trackMap.style.setProperty('--ar', img.naturalWidth / img.naturalHeight); };
        img.src = m.image;
    } else {
        trackMapBg.style.backgroundImage = 'none'; 
        trackMap.style.setProperty('--ar', 16/9);
    }
});

db.ref('liveMapOpacity').on('value', (snap) => {
    if(snap.val() !== null) trackMapBg.style.opacity = snap.val();
});

db.ref('liveMapConfig').on('value', (snap) => {
    const m = snap.val();
    if(m) {
        trackMap.querySelectorAll('.gate-marker').forEach(e => e.remove());
        mapGates = m.gates || [];
        mapGates.forEach(g => {
            trackMap.innerHTML += `
            <div class="gate-marker" style="left:${g.left}; top:${g.top};">
                <div class="leds" id="gate_leds_${g.mark}">
                    <div class="led" id="led_${g.mark}_0"></div>
                    <div class="led" id="led_${g.mark}_1"></div>
                    <div class="led" id="led_${g.mark}_2"></div>
                    <div class="led" id="led_${g.mark}_3"></div>
                </div>
                <div class="gate-label">${g.name}</div>
            </div>`;
        });
    }
});

const pilotAudioProfiles = [ { freq: 600, type: 'sine' }, { freq: 850, type: 'sine' }, { freq: 1100, type: 'triangle' }, { freq: 1400, type: 'triangle' }, { freq: 700, type: 'square' }, { freq: 1000, type: 'square' } ];

window.toggleFav = function(pid) {
    if (favoritePilots.has(pid)) favoritePilots.delete(pid);
    else favoritePilots.add(pid);
    renderBoard();
};

db.ref('liveRace').on('value', (snapshot) => {
    currentRaceData = snapshot.val();
    if (currentRaceData && currentRaceData.pilots) {
        currentRaceData.pilots.forEach(p => {
            if (p.active) {
                let prev = lastPilotState[p.id];
                if (prev) {
                    let gateChanged = (p.gateIndex !== prev.gateIndex) && p.gateIndex >= 0;
                    let justFinished = p.finished && !prev.finished;
                    if (gateChanged || justFinished) {
                        if (favoritePilots.size === 0 || favoritePilots.has(p.id)) {
                            playPilotSound(p.index || 0, justFinished);
                        }
                    }
                }
                lastPilotState[p.id] = { gateIndex: p.gateIndex, finished: p.finished };
            }
        });
    }
    renderBoard();
});

function renderBoard() {
    const data = currentRaceData;
    if (!data) return;

    if (data.config) {
        document.getElementById('spec-header-title').innerText = data.config.header || "LIVE РЕЗУЛЬТАТЫ";
        document.getElementById('session-status').style.display = data.config.showSession ? 'block' : 'none';
        board.style.display = data.config.showPilots ? 'block' : 'none';
        mapBox.style.display = data.config.showMap ? 'flex' : 'none';
    }

    if (!data.pilots) {
        document.getElementById('session-status').innerText = "Гонка еще не запущена судьей";
        board.innerHTML = '<div style="color:#444;text-align:center;margin-top:50px;">Нет данных для отображения</div>';
        return;
    }

    let displayMainTimer = data.mainTimer || "00:00.000";
    if (data.isRaceRunning) displayMainTimer = displayMainTimer.split('.')[0]; 
    document.getElementById('main-timer').innerText = displayMainTimer;
    document.getElementById('main-timer').style.color = data.isRaceRunning ? '#00ffcc' : '#ff0055';
    
    let statusMsg = data.isRaceRunning ? `Боевой заезд: ${data.targetLaps} кр.` : 'Заезд завершен / Пауза';
    if(data.config && data.config.showSession && data.sessionName) statusMsg += ` | Сессия: ${data.sessionName}`;
    document.getElementById('session-status').innerText = statusMsg;

    if (data.config && !data.config.showPilots) return; 

    let activePilots = data.pilots.filter(p => p.active === true);
    if(activePilots.length === 0) {
        board.innerHTML = '<div style="color:#444;text-align:center;margin-top:50px;">Нет активных пилотов на трассе</div>';
        return;
    }

    let visiblePilots = activePilots;
    if (favoritePilots.size > 0) visiblePilots = activePilots.filter(p => favoritePilots.has(p.id));

    board.innerHTML = '';
    
    // Рассчет правильной высоты контейнера для плавной анимации
    const spacing = getCardSpacing();
    board.style.height = (visiblePilots.length * spacing) + 'px';
    
    let ledStates = {};
    visiblePilots.forEach(p => {
        if (p.gates && mapGates.length > 0 && p.index !== undefined) {
            p.gates.forEach((g, gIdx) => {
                if (g.active) {
                    let markId = mapGates[gIdx]?.mark;
                    if (markId) {
                        let isCurrent = (!p.finished && gIdx === p.gateIndex);
                        ledStates[`led_${markId}_${p.index}`] = { color: p.color, pulse: isCurrent };
                    }
                }
            });
        }
    });

    trackMap.querySelectorAll('.led').forEach(led => {
        let state = ledStates[led.id];
        if (state) {
            led.style.background = state.color;
            led.style.boxShadow = `0 0 10px ${state.color}`;
            if (state.pulse) {
                if (!led.classList.contains('pulse-anim')) led.classList.add('pulse-anim');
            } else { led.classList.remove('pulse-anim'); }
        } else {
            led.style.background = '#333'; led.style.boxShadow = 'none'; led.classList.remove('pulse-anim');
        }
    });

    visiblePilots.forEach((p, index) => {
        const topPos = index * spacing; 
        let isLeaderClass = (index === 0 && p.lap > 0 && !p.dnf && data.config.autoSortEnabled) ? 'leader' : '';
        let isFav = favoritePilots.has(p.id);
        
        let timerColor = "#00ffcc";
        let statusTxt = `Круг: ${p.lap} / ${data.targetLaps}`;
        let displayPTime = p.time;

        if (p.dnf) { timerColor = "#ff0055"; statusTxt = "СХОД"; } 
        else if (p.finished) { timerColor = "#ffcc00"; statusTxt = "ФИНИШ"; } 
        else if (data.isRaceRunning) { displayPTime = displayPTime.split('.')[0]; }

        let gatesHtml = '';
        if (p.gates) { p.gates.forEach(g => { let act = g.active ? 'active' : ''; gatesHtml += `<span class="seq-gate ${act}">${g.name}</span>`; }); }

        // Фото пилота или заглушка
        let photoHtml = p.photo 
            ? `<div class="pilot-avatar" style="background-image: url('${p.photo}'); border-color: ${p.color}"></div>` 
            : `<div class="pilot-avatar" style="border-color: ${p.color}; color: ${p.color}">${p.name.charAt(0)}</div>`;

        // Очистка дельты от html тегов для компактного вида, если нужно, но мы оставим стили из базы
        let cleanDelta = p.deltaHtml.includes("delta-worse") ? `<span class="delta-worse">${p.deltaHtml.replace(/(<([^>]+)>)/gi, "")}</span>` 
                       : p.deltaHtml.includes("delta-better") ? `<span class="delta-better">${p.deltaHtml.replace(/(<([^>]+)>)/gi, "")}</span>` 
                       : `<span style="color:#aaa;">0.00</span>`;

        board.innerHTML += `
        <div class="pilot-card ${isLeaderClass}" id="card_${p.id}" style="top: ${topPos}px; border-left: 5px solid ${p.color}">
            
            <div class="card-left">
                <div style="display:flex; align-items:center; gap:12px;">
                    ${photoHtml}
                    <div class="pilot-info">
                        <div class="pilot-name" style="color: ${p.color}">${p.name}</div>
                        <div class="pilot-reg">${p.regId}</div>
                    </div>
                </div>
                <div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${p.id}')">👁️</div>
            </div>

            <div class="card-center">
                <div class="progress-bar"><div class="progress-fill" style="background: ${p.color}; box-shadow: 0 0 10px ${p.color}; width: ${p.progress}%;"></div></div>
                <div class="gate-sequence">${gatesHtml}</div>
            </div>

            <div class="card-right">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="status-badge">${statusTxt}</div>
                    <div class="pilot-timer" style="color:${timerColor}">${displayPTime}</div>
                </div>
                <div class="stats-mini">
                    <div>Кр: <span class="stats-val">${p.lastLap}</span></div>
                    <div>Δ: <span class="stats-val">${cleanDelta}</span></div>
                </div>
            </div>

        </div>`;
    });
}

// === АВТОНОМНЫЙ ЗВУКОВОЙ И ВИБРО МОДУЛЬ ===
const AudioCtxMonitor = window.AudioContext || window.webkitAudioContext;
let monAudioCtx; let monSoundEnabled = false; let monVibroEnabled = false;

function initMonAudio() { if (!monAudioCtx) monAudioCtx = new AudioCtxMonitor(); if (monAudioCtx.state === 'suspended') monAudioCtx.resume(); }

function playMonTone(freq, durMs, vol, type, delayMs = 0) {
    if (!monSoundEnabled || !monAudioCtx) return;
    const osc = monAudioCtx.createOscillator(); const gain = monAudioCtx.createGain();
    osc.type = type; osc.frequency.value = freq; osc.connect(gain); gain.connect(monAudioCtx.destination);
    const startTime = monAudioCtx.currentTime + (delayMs / 1000); const stopTime = startTime + (durMs / 1000);
    gain.gain.setValueAtTime(vol, startTime); gain.gain.exponentialRampToValueAtTime(0.001, stopTime);
    osc.start(startTime); osc.stop(stopTime);
}

function playPilotSound(pilotIndex, isFinish) {
    const beeps = (pilotIndex % 4) + 1; const beepDur = 40; const pauseDur = 60; const baseFreq = 880; 
    for (let i = 0; i < beeps; i++) playMonTone(baseFreq, beepDur, 0.1, 'square', i * (beepDur + pauseDur));
    if (isFinish) playMonTone(1320, 400, 0.15, 'square', beeps * (beepDur + pauseDur) + 100);
    triggerVibration(beeps, isFinish);
}

function triggerVibration(beeps, isFinish) {
    if (!monVibroEnabled || !navigator.vibrate) return;
    let pattern = [];
    for(let i = 0; i < beeps; i++) { pattern.push(40); pattern.push(60); }
    if (isFinish) { pattern.push(100); pattern.push(500); }
    navigator.vibrate(pattern);
}

function toggleMonitorSound() {
    const btn = document.getElementById('monitorSoundBtn');
    if (!monSoundEnabled) {
        initMonAudio(); monSoundEnabled = true;
        btn.style.background = '#00cc00'; btn.style.color = 'white'; btn.innerText = '🔊 Звук';
        playMonTone(1000, 100, 0.1, 'sine');
    } else { monSoundEnabled = false; btn.style.background = '#ffaa00'; btn.style.color = '#000'; btn.innerText = '🔇 Звук'; }
}

function toggleMonitorVibro() {
    const btn = document.getElementById('monitorVibroBtn');
    if (!monVibroEnabled) {
        monVibroEnabled = true; btn.style.background = '#00cc00'; btn.style.color = 'white'; btn.innerText = '📳 Вибро';
        requestWakeLock(); if (navigator.vibrate) navigator.vibrate(100);
    } else { monVibroEnabled = false; btn.style.background = '#ffaa00'; btn.style.color = '#000'; btn.innerText = '📳 Вибро'; requestWakeLock(); }
}

function toggleFullScreen() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        let docEl = document.documentElement;
        if (docEl.requestFullscreen) docEl.requestFullscreen(); else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

let wakeLock = null;
async function requestWakeLock() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { console.log('Удержание снято'); }); } 
        catch (err) { console.error(`Ошибка Wake Lock: ${err.message}`); }
    }
}
document.addEventListener('visibilitychange', async () => { if (wakeLock !== null && document.visibilityState === 'visible') await requestWakeLock(); });
</script>
</body>
</html>
